name: Deploy MLOps Application

on:
  push:
    branches:
      - main
    paths:
      - 'MLO-004/**'
      - '.github/workflows/deploy.yaml'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r MLO-004/requirements.txt

      - name: Run linting
        run: |
          pip install flake8
          flake8 MLO-004/app/
      
      - name: Run tests
        run: |
          cd MLO-004
          pytest tests/
      
      - name: Build Docker image
        run: |
          docker build --build-arg DOWNLOAD_MODEL=false \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/mlo-embed:${{ github.run_number }} \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/mlo-embed:latest \
            MLO-004/
      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/mlo-embed:${{ github.run_number }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/mlo-embed:latest
  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
    - name: Confirm image pushed
      run: |
        echo "Image ${{ secrets.DOCKERHUB_USERNAME }}/mlo-embed:${{ github.run_number }} pushed successfully"
        echo "Run: kubectl set image deployment/mlo-embed mlo-embed=${{ secrets.DOCKERHUB_USERNAME }}/mlo-embed:${{ github.run_number }}"  
     